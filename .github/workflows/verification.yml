name: Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install stable Rust with quality components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install native development libraries
        run: sudo apt-get update && sudo apt-get install --yes libnetcdf-dev libopenmpi-dev openmpi-bin
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Test every workspace target
        run: cargo test --workspace --all-targets
      - name: Test optimized code and doctests
        run: cargo test --workspace --release
      - name: Deny Clippy warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Deny rustdoc warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  fortran-parity:
    name: Fortran parity
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install stable Rust for corpus regeneration
        uses: dtolnay/rust-toolchain@stable
      - name: Install GNU Fortran, NetCDF, and Open MPI
        run: sudo apt-get update && sudo apt-get install --yes gfortran libnetcdf-dev libopenmpi-dev openmpi-bin
      - name: Prepare archive cache
        run: mkdir -p "${RUNNER_TEMP}/wrf-downloads"
      - name: Cache pinned WRF archives
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wrf-downloads
          key: wrf-archives-${{ hashFiles('UPSTREAM.toml') }}
      - name: Fetch checksum-pinned WRF source
        env:
          WRF_DOWNLOAD_CACHE: ${{ runner.temp }}/wrf-downloads
        run: ./scripts/fetch-wrf.sh
      - name: Verify WRF time behavior
        run: ./scripts/run-wrf-time-oracle.sh
      - name: Verify positive-definite correction
        run: ./scripts/run-positive-definite-oracle.sh
      - name: Verify Held-Suarez damping
        run: ./scripts/run-held-suarez-oracle.sh
      - name: Verify column-mass staggering
        run: ./scripts/run-column-mass-staggering-oracle.sh
      - name: Verify periodic big-step column-mass staggering
        run: ./scripts/run-periodic-column-mass-oracle.sh
      - name: Verify momentum coupling
        run: ./scripts/run-momentum-coupling-oracle.sh
      - name: Verify portable Fortran NaN comparison
        run: ./scripts/test-fortran-output-normalization.sh
      - name: Verify dry-air omega diagnosis
        run: ./scripts/run-omega-diagnosis-oracle.sh
      - name: Verify moisture momentum coefficients
        run: ./scripts/run-moisture-coefficient-oracle.sh
      - name: Verify full inverse density
        run: ./scripts/run-inverse-density-oracle.sh
      - name: Verify pressure-point geopotential
        run: ./scripts/run-pressure-point-geopotential-oracle.sh
      - name: Verify integrated Runge-Kutta preparation
        run: ./scripts/run-runge-kutta-preparation-oracle.sh
      - name: Verify dry Runge-Kutta tendency assembly
        run: ./scripts/run-dry-tendency-assembly-oracle.sh
      - name: Verify acoustic small-step preparation
        run: ./scripts/run-acoustic-step-preparation-oracle.sh
      - name: Verify acoustic pressure diagnosis
        run: ./scripts/run-acoustic-pressure-oracle.sh
      - name: Verify vertical acoustic coefficients
        run: ./scripts/run-vertical-acoustic-coefficients-oracle.sh
      - name: Verify specified-boundary tendency updates
        run: ./scripts/run-specified-boundary-update-oracle.sh
      - name: Verify specified-boundary geopotential updates
        run: ./scripts/run-specified-boundary-geopotential-oracle.sh
      - name: Verify zero-gradient specified boundaries
        run: ./scripts/run-zero-gradient-boundary-oracle.sh
      - name: Verify flow-dependent specified boundaries
        run: ./scripts/run-flow-dependent-boundary-oracle.sh
      - name: Verify flow-dependent inflow policies
        run: ./scripts/run-flow-dependent-inflow-policies-oracle.sh
      - name: Verify specified-boundary finalization
        run: ./scripts/run-specified-boundary-finalization-oracle.sh
      - name: Verify randomized ARW corpora
        run: ./scripts/randomized-arw/run-oracles.sh
      - name: Verify WRF Registry generation
        run: ./scripts/run-registry-oracle.sh
      - name: Verify domain decomposition
        run: ./scripts/run-domain-topology-oracle.sh
      - name: Verify clipped tile bounds
        run: ./scripts/run-clipped-tiles-oracle.sh
      - name: Verify serial and MPI halo parity
        run: ./scripts/run-mpi-halo-parity.sh
      - name: Verify WRF periodic halo behavior
        run: ./scripts/run-periodic-halo-oracle.sh
      - name: Verify Kessler warm-rain microphysics
        run: ./scripts/run-kessler-oracle.sh
      - name: Verify WRF NetCDF restart compatibility
        run: ./scripts/run-netcdf-restart-oracle.sh

  publish-wiki:
    name: Publish Wiki
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - rust-quality
      - fortran-parity
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out canonical documentation
        uses: actions/checkout@v4
      - name: Configure Wiki commit identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Authorize Wiki Git transport
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Publish canonical Wiki pages
        run: ./scripts/publish-github-wiki.sh "${GITHUB_REPOSITORY}"
